openapi: 3.0.3
info:
  title: API Fédération de Collectivités Agricoles
  description: |
    Cette API permet de gérer les collectivités agricoles affiliées à la fédération, ainsi que les membres,
    les cotisations, les activités et la trésorerie. Elle est conçue pour être utilisée par les secrétaires
    et trésoriers des collectivités, ainsi que par les administrateurs de la fédération.
  version: 1.1.0
  contact:
    name: Support API

servers:
  - url: https://localhost:3000/
    description: Serveur de production

tags:
  - name: Collectivités
    description: "A - Ouverture et gestion des collectivités"
  - name: Membres
    description: "B - Admission et gestion des membres"
  - name: Cotisations
    description: "C - Cotisations et paiements"
  - name: Trésorerie
    description: "D - Comptes et situation de trésorerie"
  - name: Activités
    description: "E - Activités des collectivités et de la fédération"
  - name: Assiduité
    description: "F - Présence et assiduité des membres"
  - name: Statistiques
    description: "G - Statistiques et rapports des collectivités"
  - name: Statistiques Fédération
    description: "H - Rapport global mensuel et annuel de la fédération"

paths:


  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister toutes les collectivités
      operationId: listCollectivites
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: ville
          in: query
          description: Filtrer par ville
          schema:
            type: string
        - name: specialite
          in: query
          description: Filtrer par spécialité agricole
          schema:
            type: string
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCollectivites'

    post:
      tags: [Collectivités]
      summary: Soumettre une demande d'ouverture d'une nouvelle collectivité
      description: |
        Soumet une demande d'ouverture de collectivité. La fédération devra accorder
        une autorisation formelle. La collectivité doit avoir au moins 10 membres
        avec une antériorité d'au moins 6 mois et les postes spécifiques doivent être pourvus.
      operationId: demanderOuvertureCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreationRequest'
      responses:
        '201':
          description: Demande d'ouverture enregistrée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Collectivités]
      summary: Obtenir les détails d'une collectivité
      operationId: getCollectivite
      responses:
        '200':
          description: Détails de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Collectivités]
      summary: Modifier les informations d'une collectivité
      operationId: updateCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteUpdateRequest'
      responses:
        '200':
          description: Collectivité mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/autorisation:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    post:
      tags: [Collectivités]
      summary: Accorder ou refuser l'autorisation d'ouverture (fédération)
      operationId: statueSurAutorisationCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutorisationRequest'
      responses:
        '200':
          description: Décision enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /collectivites/{collectiviteId}/mandats:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Collectivités]
      summary: Lister les mandats d'une collectivité
      operationId: listMandatsCollectivite
      parameters:
        - name: annee
          in: query
          schema:
            type: integer
          description: Filtrer par année civile
      responses:
        '200':
          description: Liste des mandats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mandat'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Collectivités]
      summary: Créer un nouveau mandat (suite aux votes de fin d'année)
      operationId: creerMandatCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandatCreationRequest'
      responses:
        '201':
          description: Mandat créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Membres]
      summary: Lister les membres d'une collectivité
      operationId: listMembresCollectivite
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: poste
          in: query
          description: Filtrer par poste
          schema:
            $ref: '#/components/schemas/Poste'
        - name: statut
          in: query
          description: Filtrer par statut (actif / démissionnaire)
          schema:
            type: string
            enum: [actif, demissionnaire]
      responses:
        '200':
          description: Liste des membres
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMembres'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Membres]
      summary: Admettre un nouveau membre dans une collectivité
      description: |
        Admet un nouveau membre selon les nouvelles conditions en vigueur depuis le 21 avril 2026 :
        - Être parrainé par au moins deux membres confirmés de la fédération ; le nombre de parrains
          issus de la collectivité cible doit être supérieur ou égal au nombre de parrains issus
          d'autres collectivités.
        - Fournir ses informations personnelles, incluant la nature de la relation avec chaque parrain.
        - Régler les frais d'adhésion de 50 000 MGA ainsi que l'intégralité des cotisations annuelles
          obligatoires imposées par la collectivité.
      operationId: admettreMembreCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreAdmissionRequest'
      responses:
        '201':
          description: Membre admis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres/{membreId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    get:
      tags: [Membres]
      summary: Obtenir les détails d'un membre dans une collectivité
      operationId: getMembreCollectivite
      responses:
        '200':
          description: Détails du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Membres]
      summary: Mettre à jour les informations personnelles d'un membre
      operationId: updateMembreCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreUpdateRequest'
      responses:
        '200':
          description: Membre mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/membres/{membreId}/transfert:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    post:
      tags: [Membres]
      summary: Transférer un membre vers une autre collectivité
      operationId: transfererMembre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransfertRequest'
      responses:
        '200':
          description: Transfert effectué avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres/{membreId}/demission:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    post:
      tags: [Membres]
      summary: Enregistrer la démission d'un membre
      operationId: enregistrerDemission
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                motif:
                  type: string
                  description: Motif de démission
                dateDemission:
                  type: string
                  format: date
      responses:
        '200':
          description: Démission enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /collectivites/{collectiviteId}/cotisations:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Cotisations]
      summary: Lister les cotisations d'une collectivité
      operationId: listCotisationsCollectivite
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type
          in: query
          description: Filtrer par type de cotisation
          schema:
            $ref: '#/components/schemas/TypeCotisation'
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
        - name: membreId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des cotisations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCotisations'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Cotisations]
      summary: Enregistrer un encaissement de cotisation
      description: |
        Le trésorier enregistre une cotisation. La trace inclut le montant,
        la date et le mode de paiement.
      operationId: enregistrerCotisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationRequest'
      responses:
        '201':
          description: Cotisation enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/cotisations/{cotisationId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - name: cotisationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Cotisations]
      summary: Obtenir le détail d'une cotisation
      operationId: getCotisation
      responses:
        '200':
          description: Détail de la cotisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/reversements:
    get:
      tags: [Cotisations]
      summary: Lister les reversements des collectivités vers la fédération
      operationId: listReversements
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: collectiviteId
          in: query
          schema:
            type: string
            format: uuid
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des reversements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reversement'
                  total:
                    type: integer


  /collectivites/{collectiviteId}/comptes:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Trésorerie]
      summary: Lister les comptes d'une collectivité
      operationId: listComptesCollectivite
      parameters:
        - name: type
          in: query
          description: Filtrer par type de compte
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: Liste des comptes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Trésorerie]
      summary: Ajouter un nouveau compte à une collectivité
      description: |
        Une collectivité ne peut avoir qu'un seul compte de type caisse,
        mais plusieurs comptes bancaires et mobile money.
      operationId: creerCompteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreationRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Conflit – une caisse existe déjà pour cette collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivites/{collectiviteId}/comptes/{compteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Obtenir les détails d'un compte
      operationId: getCompteCollectivite
      responses:
        '200':
          description: Détails du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Trésorerie]
      summary: Mettre à jour les informations d'un compte
      operationId: updateCompteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteUpdateRequest'
      responses:
        '200':
          description: Compte mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Trésorerie]
      summary: Supprimer un compte
      operationId: supprimerCompteCollectivite
      responses:
        '204':
          description: Compte supprimé
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Impossible de supprimer un compte avec un solde non nul
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivites/{collectiviteId}/comptes/{compteId}/solde:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Consulter le solde d'un compte à une date donnée
      operationId: getSoldeCompteCollectivite
      parameters:
        - name: date
          in: query
          description: Date à laquelle consulter le solde (défaut = aujourd'hui)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Solde du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeCompte'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes:
    get:
      tags: [Trésorerie]
      summary: Lister les comptes de la fédération
      operationId: listComptesFederation
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: Liste des comptes de la fédération
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

    post:
      tags: [Trésorerie]
      summary: Ajouter un compte à la fédération
      operationId: creerCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreationRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '409':
          $ref: '#/components/responses/Conflict'

  /federation/comptes/{compteId}:
    parameters:
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Obtenir les détails d'un compte de la fédération
      operationId: getCompteFederation
      responses:
        '200':
          description: Détails du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Trésorerie]
      summary: Mettre à jour un compte de la fédération
      operationId: updateCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteUpdateRequest'
      responses:
        '200':
          description: Compte mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes/{compteId}/solde:
    parameters:
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Consulter le solde d'un compte de la fédération à une date donnée
      operationId: getSoldeCompteFederation
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Solde du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeCompte'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Activités]
      summary: Lister les activités d'une collectivité
      operationId: listActivitesCollectivite
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeActivite'
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedActivites'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Activités]
      summary: Planifier une activité pour une collectivité
      description: |
        Permet de créer une activité (assemblée générale mensuelle, formation juniors
        ou activité exceptionnelle). Pour les activités obligatoires récurrentes,
        un jour fixe annuel peut être défini.
      operationId: planifierActiviteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteCreationRequest'
      responses:
        '201':
          description: Activité planifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites/{activiteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Activités]
      summary: Obtenir les détails d'une activité
      operationId: getActiviteCollectivite
      responses:
        '200':
          description: Détails de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Activités]
      summary: Modifier une activité planifiée
      operationId: updateActiviteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteUpdateRequest'
      responses:
        '200':
          description: Activité mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Activités]
      summary: Annuler une activité planifiée
      operationId: annulerActiviteCollectivite
      responses:
        '204':
          description: Activité annulée
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/activites:
    get:
      tags: [Activités]
      summary: Lister les activités planifiées par la fédération
      operationId: listActivitesFederation
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des activités de la fédération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedActivites'

    post:
      tags: [Activités]
      summary: Planifier une activité fédérale (pour toutes ou certaines collectivités)
      operationId: planifierActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteFederaleCreationRequest'
      responses:
        '201':
          description: Activité fédérale planifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/activites/{activiteId}:
    parameters:
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Activités]
      summary: Obtenir les détails d'une activité fédérale
      operationId: getActiviteFederation
      responses:
        '200':
          description: Détails de l'activité fédérale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Activités]
      summary: Modifier une activité fédérale
      operationId: updateActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteUpdateRequest'
      responses:
        '200':
          description: Activité fédérale mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Activités]
      summary: Annuler une activité fédérale
      operationId: annulerActiviteFederation
      responses:
        '204':
          description: Activité annulée
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites/{activiteId}/presences:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Assiduité]
      summary: Consulter la fiche de présence d'une activité
      operationId: getFichePresence
      responses:
        '200':
          description: Fiche de présence de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Assiduité]
      summary: Ouvrir ou soumettre la fiche de présence d'une activité
      description: |
        Le secrétaire initie ou soumet la fiche de présence. Les membres peuvent être
        marqués présents, absents ou excusés (si le secrétaire a été prévenu à l'avance).
        Les membres d'autres collectivités peuvent être inscrits mais leur présence
        n'est pas comptabilisée dans leur taux d'assiduité.
      operationId: soumettrePresences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresencesRequest'
      responses:
        '201':
          description: Fiche de présence enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Une fiche de présence existe déjà pour cette activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags: [Assiduité]
      summary: Mettre à jour la fiche de présence (ajouter/modifier des entrées)
      operationId: updateFichePresence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresencesRequest'
      responses:
        '200':
          description: Fiche de présence mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/activites/{activiteId}/presences:
    parameters:
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Assiduité]
      summary: Consulter la fiche de présence d'une activité fédérale
      operationId: getFichePresenceFederation
      responses:
        '200':
          description: Fiche de présence de l'activité fédérale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Assiduité]
      summary: Soumettre la fiche de présence d'une activité fédérale
      operationId: soumettrePresencesFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresencesRequest'
      responses:
        '201':
          description: Fiche de présence enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'


  /collectivites/{collectiviteId}/statistiques/rapport-mensuel:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Statistiques]
      summary: Obtenir le rapport mensuel d'une collectivité (pour la fédération)
      description: |
        Le président soumet un rapport mensuel à la fédération incluant le taux
        d'assiduité global et le nombre de membres inscrits.
      operationId: getRapportMensuelCollectivite
      parameters:
        - name: annee
          in: query
          required: true
          schema:
            type: integer
            example: 2025
        - name: mois
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
      responses:
        '200':
          description: Rapport mensuel de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuel'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/statistiques/membres:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Statistiques]
      summary: Obtenir les statistiques détaillées par membre actif
      description: |
        Réservé au président de la collectivité. Retourne pour chaque membre actif :
        le taux d'assiduité, les encaissements et les impayés potentiels sur une période.
      operationId: getStatistiquesMembres
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2025-01-01"
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2025-03-31"
      responses:
        '200':
          description: Statistiques détaillées par membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesMembres'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/statistiques/membres/{membreId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    get:
      tags: [Statistiques]
      summary: Obtenir les statistiques détaillées d'un membre actif spécifique
      operationId: getStatistiquesMembre
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Statistiques du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesMembreDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/statistiques/collectivites:
    get:
      tags: [Statistiques]
      summary: Synthèse des rapports mensuels de toutes les collectivités (fédération)
      operationId: getSyntheseCollectivites
      parameters:
        - name: annee
          in: query
          required: true
          schema:
            type: integer
        - name: mois
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Synthèse des collectivités pour le mois donné
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyntheseCollectivites'

components:


  parameters:
    CollectiviteId:
      name: collectiviteId
      in: path
      required: true
      description: Identifiant unique de la collectivité
      schema:
        type: string
        format: uuid

    MembreId:
      name: membreId
      in: path
      required: true
      description: Identifiant unique du membre
      schema:
        type: string
        format: uuid

    CompteId:
      name: compteId
      in: path
      required: true
      description: Identifiant unique du compte
      schema:
        type: string
        format: uuid

    ActiviteId:
      name: activiteId
      in: path
      required: true
      description: Identifiant unique de l'activité
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      description: Numéro de page (commence à 1)
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      description: Nombre d'éléments par page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100


  schemas:
    Poste:
      type: string
      enum:
        - president
        - president_adjoint
        - tresorier
        - secretaire
        - membre_confirme
        - membre_junior
      description: Poste occupé par un membre dans une collectivité

    Genre:
      type: string
      enum: [masculin, feminin]

    ModePaiement:
      type: string
      enum: [espece, virement_bancaire, mobile_money]

    TypeCotisation:
      type: string
      enum: [mensuelle, annuelle, ponctuelle]
      description: Périodicité ou nature de la cotisation

    TypeCompte:
      type: string
      enum: [caisse, bancaire, mobile_money]

    BanqueName:
      type: string
      enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]

    ServiceMobileMoney:
      type: string
      enum: [Orange_Money, Mvola, Airtel_Money]

    TypeActivite:
      type: string
      enum:
        - assemblee_generale_mensuelle
        - formation_juniors
        - exceptionnelle
        - federale

    StatutPresence:
      type: string
      enum: [present, absent, excuse]

    Collectivite:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        numero:
          type: string
          description: Numéro unique de la collectivité
          example: "COLL-001"
        nom:
          type: string
          description: Nom unique de la collectivité
          example: "Collectivité Riziculteurs Antananarivo"
        ville:
          type: string
          example: "Antananarivo"
        specialiteAgricole:
          type: string
          example: "Riziculture"
        dateCreation:
          type: string
          format: date
          readOnly: true
        statut:
          type: string
          enum: [en_attente, autorisee, rejetee, active, inactive]
          readOnly: true
        nombreMembres:
          type: integer
          readOnly: true
      required:
        - nom
        - ville
        - specialiteAgricole

    CollectiviteCreationRequest:
      type: object
      required:
        - nom
        - ville
        - specialiteAgricole
        - membresInitiaux
        - postesInitiaux
      properties:
        nom:
          type: string
        ville:
          type: string
        specialiteAgricole:
          type: string
        membresInitiaux:
          type: array
          description: Liste des IDs de membres existants (min 10, ancienneté ≥ 6 mois)
          minItems: 10
          items:
            type: string
            format: uuid
        postesInitiaux:
          $ref: '#/components/schemas/PostesInitiaux'

    CollectiviteUpdateRequest:
      type: object
      properties:
        nom:
          type: string
        ville:
          type: string
        specialiteAgricole:
          type: string

    PostesInitiaux:
      type: object
      description: Membres occupant les postes spécifiques lors de la création
      required:
        - presidentId
        - presidentAdjointId
        - tresorierIid
        - secretaireId
      properties:
        presidentId:
          type: string
          format: uuid
        presidentAdjointId:
          type: string
          format: uuid
        tresorierIid:
          type: string
          format: uuid
        secretaireId:
          type: string
          format: uuid

    AutorisationRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum: [autorisee, rejetee]
        motif:
          type: string
          description: Motif de refus (obligatoire si rejetee)

    PagedCollectivites:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Collectivite'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    Mandat:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        collectiviteId:
          type: string
          format: uuid
        annee:
          type: integer
          description: Année civile du mandat
          example: 2025
        president:
          $ref: '#/components/schemas/MembreRef'
        presidentAdjoint:
          $ref: '#/components/schemas/MembreRef'
        tresorier:
          $ref: '#/components/schemas/MembreRef'
        secretaire:
          $ref: '#/components/schemas/MembreRef'

    MandatCreationRequest:
      type: object
      required:
        - annee
        - presidentId
        - presidentAdjointId
        - tresorierIid
        - secretaireId
      properties:
        annee:
          type: integer
          example: 2026
        presidentId:
          type: string
          format: uuid
          description: Ne peut pas avoir plus de 2 mandats au poste de président
        presidentAdjointId:
          type: string
          format: uuid
        tresorierIid:
          type: string
          format: uuid
        secretaireId:
          type: string
          format: uuid

    MembreRef:
      type: object
      description: Référence légère d'un membre
      properties:
        id:
          type: string
          format: uuid
        nomComplet:
          type: string

    Membre:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        nom:
          type: string
        prenom:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          $ref: '#/components/schemas/Genre'
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
          pattern: '^\+?[0-9]{9,15}$'
        email:
          type: string
          format: email
        dateAdhesion:
          type: string
          format: date
          readOnly: true
        poste:
          $ref: '#/components/schemas/Poste'
        collectiviteId:
          type: string
          format: uuid
          readOnly: true
        statut:
          type: string
          enum: [actif, demissionnaire]
          readOnly: true
        parrainId:
          type: string
          format: uuid
          readOnly: true

    MembreAdmissionRequest:
      type: object
      required:
        - nom
        - prenom
        - dateNaissance
        - genre
        - adresse
        - metier
        - telephone
        - email
        - parrainId
        - paiement
      properties:
        nom:
          type: string
        prenom:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          $ref: '#/components/schemas/Genre'
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
          pattern: '^\+?[0-9]{9,15}$'
        email:
          type: string
          format: email
        parrainId:
          type: string
          format: uuid
          description: ID d'un membre confirmé avec plus de 90 jours d'ancienneté
        paiement:
          $ref: '#/components/schemas/PaiementAdhesion'

    PaiementAdhesion:
      type: object
      required:
        - mode
        - montant
      properties:
        mode:
          type: string
          enum: [mobile_money, virement_bancaire]
        montant:
          type: number
          description: Doit être égal à 50000 MGA
          example: 50000
        devise:
          type: string
          default: MGA
        reference:
          type: string
          description: Référence de transaction

    MembreUpdateRequest:
      type: object
      properties:
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
          pattern: '^\+?[0-9]{9,15}$'
        email:
          type: string
          format: email

    TransfertRequest:
      type: object
      required:
        - nouvelleCollectiviteId
      properties:
        nouvelleCollectiviteId:
          type: string
          format: uuid
        motif:
          type: string
          example: "Changement de ville"

    PagedMembres:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Membre'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    Cotisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        membreId:
          type: string
          format: uuid
        collectiviteId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TypeCotisation'
        montant:
          type: number
          example: 10000
        devise:
          type: string
          default: MGA
        dateEncaissement:
          type: string
          format: date-time
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        reference:
          type: string
          description: Référence de transaction (mobile money ou virement)
        description:
          type: string
          description: Motif pour les cotisations ponctuelles

    CotisationRequest:
      type: object
      required:
        - membreId
        - type
        - montant
        - dateEncaissement
        - modePaiement
      properties:
        membreId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TypeCotisation'
        montant:
          type: number
          minimum: 0
        devise:
          type: string
          default: MGA
        dateEncaissement:
          type: string
          format: date-time
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        reference:
          type: string
        description:
          type: string
          description: Requis pour les cotisations ponctuelles

    PagedCotisations:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Cotisation'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    Reversement:
      type: object
      description: Reversement d'un pourcentage des cotisations périodiques à la fédération
      properties:
        id:
          type: string
          format: uuid
        collectiviteId:
          type: string
          format: uuid
        montant:
          type: number
        devise:
          type: string
          default: MGA
        pourcentage:
          type: number
          description: Pourcentage appliqué sur les cotisations périodiques
        dateReversement:
          type: string
          format: date
        periodeDebut:
          type: string
          format: date
        periodeFin:
          type: string
          format: date

    Compte:
      type: object
      discriminator:
        propertyName: type
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          $ref: '#/components/schemas/TypeCompte'
        solde:
          type: number
          readOnly: true
        devise:
          type: string
          default: MGA
          readOnly: true

    CompteCaisse:
      allOf:
        - $ref: '#/components/schemas/Compte'
        - type: object
          description: Compte caisse (unique par collectivité / fédération)

    CompteBancaire:
      allOf:
        - $ref: '#/components/schemas/Compte'
        - type: object
          properties:
            nomTitulaire:
              type: string
            nomBanque:
              $ref: '#/components/schemas/BanqueName'
            numeroCompte:
              type: string
              pattern: '^\d{5}\d{5}\d{11}\d{2}$'
              description: "Format RIB: BBBBBGGGGGCCCCCCCCCCCKKK (23 chiffres)"
              example: "0001200015000000000010147"
          required:
            - nomTitulaire
            - nomBanque
            - numeroCompte

    CompteMobileMoney:
      allOf:
        - $ref: '#/components/schemas/Compte'
        - type: object
          properties:
            nomTitulaire:
              type: string
            serviceMobileMoney:
              $ref: '#/components/schemas/ServiceMobileMoney'
            numeroDeTelephone:
              type: string
              pattern: '^\+?[0-9]{9,15}$'
              description: Numéro de téléphone unique associé au compte
          required:
            - nomTitulaire
            - serviceMobileMoney
            - numeroDeTelephone

    CompteCreationRequest:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/TypeCompte'
        nomTitulaire:
          type: string
          description: Requis pour bancaire et mobile_money
        nomBanque:
          $ref: '#/components/schemas/BanqueName'
        numeroCompte:
          type: string
          pattern: '^\d{23}$'
          description: Requis pour bancaire
        serviceMobileMoney:
          $ref: '#/components/schemas/ServiceMobileMoney'
        numeroDeTelephone:
          type: string
          description: Requis pour mobile_money

    CompteUpdateRequest:
      type: object
      properties:
        nomTitulaire:
          type: string

    SoldeCompte:
      type: object
      properties:
        compteId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TypeCompte'
        solde:
          type: number
        devise:
          type: string
          default: MGA
        date:
          type: string
          format: date

    # ---- ACTIVITÉS ----
    Activite:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          $ref: '#/components/schemas/TypeActivite'
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
          description: Vrai si la présence est obligatoire pour tous les membres concernés
        membresConvoquesIds:
          type: array
          description: Si null ou vide, s'applique à tous les membres
          items:
            type: string
            format: uuid
        collectiviteId:
          type: string
          format: uuid
          description: Null si activité fédérale
        recurrence:
          $ref: '#/components/schemas/Recurrence'

    Recurrence:
      type: object
      description: Définit le pattern de récurrence annuelle d'une activité
      properties:
        jourDeLaSemaine:
          type: string
          enum: [lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche]
        numeroSemaineDuMois:
          type: integer
          minimum: 1
          maximum: 5
          description: "Ex: 2 = deuxième semaine du mois"

    ActiviteCreationRequest:
      type: object
      required:
        - type
        - titre
        - date
      properties:
        type:
          $ref: '#/components/schemas/TypeActivite'
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
          default: true
        membresConvoquesIds:
          type: array
          items:
            type: string
            format: uuid
          description: Laisser vide pour convoquer tous les membres
        recurrence:
          $ref: '#/components/schemas/Recurrence'

    ActiviteFederaleCreationRequest:
      allOf:
        - $ref: '#/components/schemas/ActiviteCreationRequest'
        - type: object
          properties:
            collectivitesInviteesIds:
              type: array
              description: IDs des collectivités invitées. Vide = toutes les collectivités
              items:
                type: string
                format: uuid

    ActiviteUpdateRequest:
      type: object
      properties:
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
        membresConvoquesIds:
          type: array
          items:
            type: string
            format: uuid

    PagedActivites:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Activite'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    FichePresence:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        activiteId:
          type: string
          format: uuid
        dateEnregistrement:
          type: string
          format: date-time
          readOnly: true
        presences:
          type: array
          items:
            $ref: '#/components/schemas/LignePresence'

    LignePresence:
      type: object
      properties:
        membreId:
          type: string
          format: uuid
        statut:
          $ref: '#/components/schemas/StatutPresence'
        motifAbsence:
          type: string
          description: Obligatoire si statut = excuse
        membreExterne:
          type: boolean
          default: false
          description: Vrai si le membre appartient à une autre collectivité (non comptabilisé dans l'assiduité)
      required:
        - membreId
        - statut

    PresencesRequest:
      type: object
      required:
        - presences
      properties:
        presences:
          type: array
          items:
            $ref: '#/components/schemas/LignePresence'

    RapportMensuel:
      type: object
      description: Rapport mensuel de la collectivité envoyé à la fédération
      properties:
        collectiviteId:
          type: string
          format: uuid
        annee:
          type: integer
        mois:
          type: integer
        nombreMembresInscrits:
          type: integer
        tauxAssiduiteMoyen:
          type: number
          format: float
          description: Taux d'assiduité moyen de la collectivité en pourcentage
          example: 78.5
        dateGeneration:
          type: string
          format: date-time

    StatistiquesMembres:
      type: object
      properties:
        collectiviteId:
          type: string
          format: uuid
        dateDebut:
          type: string
          format: date
        dateFin:
          type: string
          format: date
        membres:
          type: array
          items:
            $ref: '#/components/schemas/StatistiquesMembreDetail'

    StatistiquesMembreDetail:
      type: object
      properties:
        membreId:
          type: string
          format: uuid
        nomComplet:
          type: string
        poste:
          $ref: '#/components/schemas/Poste'
        tauxAssiduité:
          type: number
          format: float
          description: Taux d'assiduité en pourcentage sur la période
          example: 83.3
        montantEncaisse:
          type: number
          description: Total des cotisations encaissées sur la période (MGA)
        montantImpayePotentiel:
          type: number
          description: Montant potentiellement non réglé sur la période (MGA)
        devise:
          type: string
          default: MGA

    SyntheseCollectivites:
      type: object
      properties:
        annee:
          type: integer
        mois:
          type: integer
        totalCollectivites:
          type: integer
        collectivites:
          type: array
          items:
            $ref: '#/components/schemas/RapportMensuel'

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
      required:
        - code
        - message


  responses:
    BadRequest:
      description: Requête invalide – données manquantes ou incorrectes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: INVALID_REQUEST
            message: "Le champ 'email' est invalide."

    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NOT_FOUND
            message: "La ressource demandée est introuvable."

    Conflict:
      description: Conflit avec l'état actuel de la ressource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: CONFLICT
            message: "Une ressource similaire existe déjà."

    UnprocessableEntity:
      description: Entité non traitable – règles métier non respectées
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: BUSINESS_RULE_VIOLATION
            message: "Le parrain n'a pas l'ancienneté requise de 90 jours."

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []y