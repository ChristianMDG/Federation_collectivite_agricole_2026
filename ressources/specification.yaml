openapi: 3.0.3
info:
  title: API Fédération de Collectivités Agricoles
  description: |
    API REST pour la gestion digitale de la fédération de collectivités agricoles à Madagascar.
    Elle couvre la gestion des collectivités, des membres, des cotisations, de la trésorerie,
    des activités, de l'assiduité et des statistiques.
  version: 1.0.0
  contact:
    name: Fédération Nationale des Collectivités Agricoles - Madagascar

servers:
  - url: https://api.federation-agricole.mg/
    description: Serveur de production

tags:
  - name: Collectivités
    description: "A - Ouverture et gestion des collectivités"
  - name: Membres
    description: "B - Admission et gestion des membres"
  - name: Cotisations
    description: "C - Cotisations et paiements"
  - name: Trésorerie
    description: "D - Comptes et situation de trésorerie"
  - name: Activités
    description: "E - Activités des collectivités et de la fédération"
  - name: Assiduité
    description: "F - Présence et assiduité des membres"
  - name: Statistiques
    description: "G - Statistiques et rapports"

paths:

  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister toutes les collectivités
      operationId: listCollectivites
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: ville
          in: query
          description: Filtrer par ville
          schema:
            type: string
        - name: specialite
          in: query
          description: Filtrer par spécialité agricole
          schema:
            type: string
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCollectivites'
 
    post:
      tags: [Collectivités]
      summary: Soumettre une demande d'ouverture d'une nouvelle collectivité
      description: |
        Soumet une demande d'ouverture de collectivité. La fédération devra accorder
        une autorisation formelle. La collectivité doit avoir au moins 10 membres
        avec une antériorité d'au moins 6 mois et les postes spécifiques doivent être pourvus.
      operationId: demanderOuvertureCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreationRequest'
      responses:
        '201':
          description: Demande d'ouverture enregistrée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
 
  /collectivites/{collectiviteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Collectivités]
      summary: Obtenir les détails d'une collectivité
      operationId: getCollectivite
      responses:
        '200':
          description: Détails de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'
 
    patch:
      tags: [Collectivités]
      summary: Modifier les informations d'une collectivité
      operationId: updateCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteUpdateRequest'
      responses:
        '200':
          description: Collectivité mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'
 
  /collectivites/{collectiviteId}/autorisation:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    post:
      tags: [Collectivités]
      summary: Accorder ou refuser l'autorisation d'ouverture (fédération)
      operationId: statueSurAutorisationCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutorisationRequest'
      responses:
        '200':
          description: Décision enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
 
  /collectivites/{collectiviteId}/mandats:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Collectivités]
      summary: Lister les mandats d'une collectivité
      operationId: listMandatsCollectivite
      parameters:
        - name: annee
          in: query
          schema:
            type: integer
          description: Filtrer par année civile
      responses:
        '200':
          description: Liste des mandats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mandat'
        '404':
          $ref: '#/components/responses/NotFound'
 
    post:
      tags: [Collectivités]
      summary: Créer un nouveau mandat (suite aux votes de fin d'année)
      operationId: creerMandatCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandatCreationRequest'
      responses:
        '201':
          description: Mandat créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Membres]
      summary: Lister les membres d'une collectivité
      operationId: listMembresCollectivite
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: poste
          in: query
          description: Filtrer par poste
          schema:
            $ref: '#/components/schemas/Poste'
        - name: statut
          in: query
          description: Filtrer par statut (actif / démissionnaire)
          schema:
            type: string
            enum: [actif, demissionnaire]
      responses:
        '200':
          description: Liste des membres
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMembres'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Membres]
      summary: Admettre un nouveau membre dans une collectivité
      description: |
        Admet un nouveau membre. Le membre doit être parrainé par un membre confirmé
        ayant plus de 90 jours d'ancienneté, fournir ses informations personnelles et
        régler les frais d'adhésion de 50 000 MGA.
      operationId: admettreMembreCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreAdmissionRequest'
      responses:
        '201':
          description: Membre admis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres/{membreId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    get:
      tags: [Membres]
      summary: Obtenir les détails d'un membre dans une collectivité
      operationId: getMembreCollectivite
      responses:
        '200':
          description: Détails du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Membres]
      summary: Mettre à jour les informations personnelles d'un membre
      operationId: updateMembreCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreUpdateRequest'
      responses:
        '200':
          description: Membre mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/membres/{membreId}/transfert:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    post:
      tags: [Membres]
      summary: Transférer un membre vers une autre collectivité
      operationId: transfererMembre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransfertRequest'
      responses:
        '200':
          description: Transfert effectué avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /collectivites/{collectiviteId}/membres/{membreId}/demission:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    post:
      tags: [Membres]
      summary: Enregistrer la démission d'un membre
      operationId: enregistrerDemission
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                motif:
                  type: string
                  description: Motif de démission
                dateDemission:
                  type: string
                  format: date
      responses:
        '200':
          description: Démission enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'


  /collectivites/{collectiviteId}/cotisations:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Cotisations]
      summary: Lister les cotisations d'une collectivité
      operationId: listCotisationsCollectivite
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type
          in: query
          description: Filtrer par type de cotisation
          schema:
            $ref: '#/components/schemas/TypeCotisation'
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
        - name: membreId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des cotisations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCotisations'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Cotisations]
      summary: Enregistrer un encaissement de cotisation
      description: |
        Le trésorier enregistre une cotisation. La trace inclut le montant,
        la date et le mode de paiement.
      operationId: enregistrerCotisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationRequest'
      responses:
        '201':
          description: Cotisation enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/cotisations/{cotisationId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - name: cotisationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Cotisations]
      summary: Obtenir le détail d'une cotisation
      operationId: getCotisation
      responses:
        '200':
          description: Détail de la cotisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/reversements:
    get:
      tags: [Cotisations]
      summary: Lister les reversements des collectivités vers la fédération
      operationId: listReversements
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: collectiviteId
          in: query
          schema:
            type: string
            format: uuid
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des reversements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reversement'
                  total:
                    type: integer
  /collectivites/{collectiviteId}/comptes:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Trésorerie]
      summary: Lister les comptes d'une collectivité
      operationId: listComptesCollectivite
      parameters:
        - name: type
          in: query
          description: Filtrer par type de compte
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: Liste des comptes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Trésorerie]
      summary: Ajouter un nouveau compte à une collectivité
      description: |
        Une collectivité ne peut avoir qu'un seul compte de type caisse,
        mais plusieurs comptes bancaires et mobile money.
      operationId: creerCompteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreationRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Conflit – une caisse existe déjà pour cette collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivites/{collectiviteId}/comptes/{compteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Obtenir les détails d'un compte
      operationId: getCompteCollectivite
      responses:
        '200':
          description: Détails du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Trésorerie]
      summary: Mettre à jour les informations d'un compte
      operationId: updateCompteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteUpdateRequest'
      responses:
        '200':
          description: Compte mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Trésorerie]
      summary: Supprimer un compte
      operationId: supprimerCompteCollectivite
      responses:
        '204':
          description: Compte supprimé
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Impossible de supprimer un compte avec un solde non nul
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivites/{collectiviteId}/comptes/{compteId}/solde:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Consulter le solde d'un compte à une date donnée
      operationId: getSoldeCompteCollectivite
      parameters:
        - name: date
          in: query
          description: Date à laquelle consulter le solde (défaut = aujourd'hui)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Solde du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeCompte'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes:
    get:
      tags: [Trésorerie]
      summary: Lister les comptes de la fédération
      operationId: listComptesFederation
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: Liste des comptes de la fédération
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

    post:
      tags: [Trésorerie]
      summary: Ajouter un compte à la fédération
      operationId: creerCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreationRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '409':
          $ref: '#/components/responses/Conflict'

  /federation/comptes/{compteId}:
    parameters:
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Obtenir les détails d'un compte de la fédération
      operationId: getCompteFederation
      responses:
        '200':
          description: Détails du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Trésorerie]
      summary: Mettre à jour un compte de la fédération
      operationId: updateCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteUpdateRequest'
      responses:
        '200':
          description: Compte mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes/{compteId}/solde:
    parameters:
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Consulter le solde d'un compte de la fédération à une date donnée
      operationId: getSoldeCompteFederation
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Solde du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeCompte'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Activités]
      summary: Lister les activités d'une collectivité
      operationId: listActivitesCollectivite
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeActivite'
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedActivites'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Activités]
      summary: Planifier une activité pour une collectivité
      description: |
        Permet de créer une activité (assemblée générale mensuelle, formation juniors
        ou activité exceptionnelle). Pour les activités obligatoires récurrentes,
        un jour fixe annuel peut être défini.
      operationId: planifierActiviteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteCreationRequest'
      responses:
        '201':
          description: Activité planifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites/{activiteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Activités]
      summary: Obtenir les détails d'une activité
      operationId: getActiviteCollectivite
      responses:
        '200':
          description: Détails de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Activités]
      summary: Modifier une activité planifiée
      operationId: updateActiviteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteUpdateRequest'
      responses:
        '200':
          description: Activité mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Activités]
      summary: Annuler une activité planifiée
      operationId: annulerActiviteCollectivite
      responses:
        '204':
          description: Activité annulée
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/activites:
    get:
      tags: [Activités]
      summary: Lister les activités planifiées par la fédération
      operationId: listActivitesFederation
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des activités de la fédération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedActivites'

    post:
      tags: [Activités]
      summary: Planifier une activité fédérale (pour toutes ou certaines collectivités)
      operationId: planifierActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteFederaleCreationRequest'
      responses:
        '201':
          description: Activité fédérale planifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/activites/{activiteId}:
    parameters:
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Activités]
      summary: Obtenir les détails d'une activité fédérale
      operationId: getActiviteFederation
      responses:
        '200':
          description: Détails de l'activité fédérale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Activités]
      summary: Modifier une activité fédérale
      operationId: updateActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteUpdateRequest'
      responses:
        '200':
          description: Activité fédérale mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Activités]
      summary: Annuler une activité fédérale
      operationId: annulerActiviteFederation
      responses:
        '204':
          description: Activité annulée
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites/{activiteId}/presences:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Assiduité]
      summary: Consulter la fiche de présence d'une activité
      operationId: getFichePresence
      responses:
        '200':
          description: Fiche de présence de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Assiduité]
      summary: Ouvrir ou soumettre la fiche de présence d'une activité
      description: |
        Le secrétaire initie ou soumet la fiche de présence. Les membres peuvent être
        marqués présents, absents ou excusés (si le secrétaire a été prévenu à l'avance).
        Les membres d'autres collectivités peuvent être inscrits mais leur présence
        n'est pas comptabilisée dans leur taux d'assiduité.
      operationId: soumettrePresences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresencesRequest'
      responses:
        '201':
          description: Fiche de présence enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Une fiche de présence existe déjà pour cette activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags: [Assiduité]
      summary: Mettre à jour la fiche de présence (ajouter/modifier des entrées)
      operationId: updateFichePresence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresencesRequest'
      responses:
        '200':
          description: Fiche de présence mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/activites/{activiteId}/presences:
    parameters:
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Assiduité]
      summary: Consulter la fiche de présence d'une activité fédérale
      operationId: getFichePresenceFederation
      responses:
        '200':
          description: Fiche de présence de l'activité fédérale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Assiduité]
      summary: Soumettre la fiche de présence d'une activité fédérale
      operationId: soumettrePresencesFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresencesRequest'
      responses:
        '201':
          description: Fiche de présence enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/statistiques/rapport-mensuel:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Statistiques]
      summary: Obtenir le rapport mensuel d'une collectivité (pour la fédération)
      description: |
        Le président soumet un rapport mensuel à la fédération incluant le taux
        d'assiduité global et le nombre de membres inscrits.
      operationId: getRapportMensuelCollectivite
      parameters:
        - name: annee
          in: query
          required: true
          schema:
            type: integer
            example: 2025
        - name: mois
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
      responses:
        '200':
          description: Rapport mensuel de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuel'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/statistiques/membres:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Statistiques]
      summary: Obtenir les statistiques détaillées par membre actif
      description: |
        Réservé au président de la collectivité. Retourne pour chaque membre actif :
        le taux d'assiduité, les encaissements et les impayés potentiels sur une période.
      operationId: getStatistiquesMembres
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2025-01-01"
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2025-03-31"
      responses:
        '200':
          description: Statistiques détaillées par membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesMembres'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/statistiques/membres/{membreId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    get:
      tags: [Statistiques]
      summary: Obtenir les statistiques détaillées d'un membre actif spécifique
      operationId: getStatistiquesMembre
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Statistiques du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesMembreDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/statistiques/collectivites:
    get:
      tags: [Statistiques]
      summary: Synthèse des rapports mensuels de toutes les collectivités (fédération)
      operationId: getSyntheseCollectivites
      parameters:
        - name: annee
          in: query
          required: true
          schema:
            type: integer
        - name: mois
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Synthèse des collectivités pour le mois donné
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyntheseCollectivites'

components:

  parameters:
    CollectiviteId:
      name: collectiviteId
      in: path
      required: true
      description: Identifiant unique de la collectivité
      schema:
        type: string
        format: uuid

    MembreId:
      name: membreId
      in: path
      required: true
      description: Identifiant unique du membre
      schema:
        type: string
        format: uuid

    CompteId:
      name: compteId
      in: path
      required: true
      description: Identifiant unique du compte
      schema:
        type: string
        format: uuid

    ActiviteId:
      name: activiteId
      in: path
      required: true
      description: Identifiant unique de l'activité
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      description: Numéro de page (commence à 1)
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      description: Nombre d'éléments par page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:

    Poste:
      type: string
      enum:
        - president
        - president_adjoint
        - tresorier
        - secretaire
        - membre_confirme
        - membre_junior
      description: Poste occupé par un membre dans une collectivité

    Genre:
      type: string
      enum: [masculin, feminin]

    ModePaiement:
      type: string
      enum: [espece, virement_bancaire, mobile_money]

    TypeCotisation:
      type: string
      enum: [mensuelle, annuelle, ponctuelle]
      description: Périodicité ou nature de la cotisation

    TypeCompte:
      type: string
      enum: [caisse, bancaire, mobile_money]

    BanqueName:
      type: string
      enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]

    ServiceMobileMoney:
      type: string
      enum: [Orange_Money, Mvola, Airtel_Money]

    TypeActivite:
      type: string
      enum:
        - assemblee_generale_mensuelle
        - formation_juniors
        - exceptionnelle
        - federale

    StatutPresence:
      type: string
      enum: [present, absent, excuse]

    Collectivite:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        numero:
          type: string
          description: Numéro unique de la collectivité
          example: "COLL-001"
        nom:
          type: string
          description: Nom unique de la collectivité
          example: "Collectivité Riziculteurs Antananarivo"
        ville:
          type: string
          example: "Antananarivo"
        specialiteAgricole:
          type: string
          example: "Riziculture"
        dateCreation:
          type: string
          format: date
          readOnly: true
        statut:
          type: string
          enum: [en_attente, autorisee, rejetee, active, inactive]
          readOnly: true
        nombreMembres:
          type: integer
          readOnly: true
      required:
        - nom
        - ville
        - specialiteAgricole

    CollectiviteCreationRequest:
      type: object
      required:
        - nom
        - ville
        - specialiteAgricole
        - membresInitiaux
        - postesInitiaux
      properties:
        nom:
          type: string
        ville:
          type: string
        specialiteAgricole:
          type: string
        membresInitiaux:
          type: array
          description: Liste des IDs de membres existants (min 10, ancienneté ≥ 6 mois)
          minItems: 10
          items:
            type: string
            format: uuid
        postesInitiaux:
          $ref: '#/components/schemas/PostesInitiaux'

    CollectiviteUpdateRequest:
      type: object
      properties:
        nom:
          type: string
        ville:
          type: string
        specialiteAgricole:
          type: string

    PostesInitiaux:
      type: object
      description: Membres occupant les postes spécifiques lors de la création
      required:
        - presidentId
        - presidentAdjointId
        - tresorierIid
        - secretaireId
      properties:
        presidentId:
          type: string
          format: uuid
        presidentAdjointId:
          type: string
          format: uuid
        tresorierIid:
          type: string
          format: uuid
        secretaireId:
          type: string
          format: uuid

    AutorisationRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum: [autorisee, rejetee]
        motif:
          type: string
          description: Motif de refus (obligatoire si rejetee)

    PagedCollectivites:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Collectivite'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

  